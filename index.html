 while(AUD.next<actx.currentTime+.14){const i=AUD.step%s.lead.length,L=s.lead[i],B=s.bass[i%s.bass.length],dt=1/s.spd;

function jin(notes,spd,type){if(!actx||!G||!G.opts.sfx)return;let t=actx.currentTime+.02;const dt=1/(spd||8);
 for(const n of notes){if(n)tone(midi(n),t,dt*.9,type||'square',.04);t+=dt}AUD.hold=t+.1;if(AUD.song)AUD.next=Math.max(AUD.next,t+.1)}
function sfx(n){if(!G||!G.opts.sfx||!actx)return;const t=actx.currentTime;switch(n){
 case 'blip':tone(900,t,.03,'square',.02);break;
 case 'conf':tone(1100,t,.05,'square',.03);break;
 case 'deny':tone(140,t,.09,'square',.035);break;
 case 'bump':tone(95,t,.06,'square',.03);break;
 case 'hit':tone(300,t,.1,'sawtooth',.05,90);break;
 case 'hit2':tone(520,t,.12,'sawtooth',.06,70);break;
 case 'faint':tone(420,t,.45,'square',.05,60);break;

 case 'lvl':jin([72,76,79,84],11);break;

};
const DEXN=SP.length-1; // the Kindex grows automatically as species are appended

//------------------------------------------------------------ core engine: state, modes, input
let G=null,cv=null,ctx=null,INGAME=false;
const MODES=[];const EVOQ=[];
function pushM(m){MODES.push(m)}
function remM(m){const i=MODES.indexOf(m);if(i>=0)MODES.splice(i,1)}
function topM(){return MODES[MODES.length-1]}
const KEYS={},KEYP={};
function setKey(k,down){if(down){if(!KEYS[k])KEYP[k]=1;KEYS[k]=1}else{KEYS[k]=0}}
function kp(k){if(KEYP[k]){KEYP[k]=0;return 1}return 0}
const DV={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]};
const OPP={u:'d',d:'u',l:'r',r:'l'};
const CURDIR={'^':'u','v':'d','<':'l','>':'r'}; // electric "current" floor tiles: drift this way

function newGame(name){G={v:1,name:(name||'RIN').toUpperCase().slice(0,7),map:'home',x:4,y:4,dir:'d',
 party:[],vault:[],bag:{},money:1500,flags:{},badges:[],
 time:8*60,day:0,steps:0,lastGift:-1,rival:3,
 opts:{txt:1,mus:1,sfx:1},seen:{},caught:{},
 roamer:{on:0,map:'route1',hp:-1,st:0,slp:0,beat:0,caught:0},
 heal:{m:'home',x:4,y:4}};
 resetNpcs();INGAME=true}
function setF(f){G.flags[f]=1}
function hasF(f){return !!G.flags[f]}
function phase(){const h=fl(G.time/60)%24;return (h>=4&&h<10)?'m':(h>=10&&h<20)?'d':'n'}
function tickTime(){G.time+=1/60;if(G.time>=1440){G.time-=1440;G.day++}}
function clockStr(){const t=fl(G.time),h=fl(t/60)%24,m=t%60;return (h<10?'0':'')+h+':'+(m<10?'0':'')+m}

//------------------------------------------------------------ save / load
function saveData(){return JSON.stringify({v:1,g:G})}
function doSave(){try{localStorage.setItem('faunwild1',saveData());return true}catch(e){return false}}
function hasSave(){try{return !!localStorage.getItem('faunwild1')}catch(e){return false}}
function applySave(o){if(!o||o.v!==1||!o.g||!o.g.party)return false;G=o.g;if(!G.roamer)G.roamer={on:0,map:'route1',hp:-1,st:0,slp:0,beat:0,caught:0};resetNpcs();INGAME=true;return true}
function loadSave(){try{const s=localStorage.getItem('faunwild1');if(!s)return false;return applySave(JSON.parse(s))}catch(e){return false}}
function exportCode(){try{return 'FWN1.'+btoa(unescape(encodeURIComponent(saveData())))}catch(e){return''}}
function importCode(s){try{s=(s||'').trim();if(s.indexOf('FWN1.')!==0)return false;return applySave(JSON.parse(decodeURIComponent(escape(atob(s.slice(5))))))}catch(e){return false}}
function resetNpcs(){for(const k in MAPS){for(const n of MAPS[k].npcs){if(n.x0===undefined){n.x0=n.x;n.y0=n.y}n.x=n.x0;n.y=n.y0;n.fdir=n.dir;n.px=0;n.py=0;n.wt=30+ri(60)}}}

//------------------------------------------------------------ bag
function addItem(id,q){G.bag[id]=(G.bag[id]||0)+(q||1)}
function remItem(id,q){G.bag[id]=(G.bag[id]||0)-(q||1);if(G.bag[id]<=0)delete G.bag[id]}
function itemCount(id){return G.bag[id]||0}
function bagList(){return BAGORDER.filter(id=>G.bag[id]>0)}

//------------------------------------------------------------ monsters
function expFor(l){return l*l*l}
function movesUpTo(id,lv){const ls=SP[id].mv.filter(e=>e[0]<=lv).map(e=>e[1]);const u=[];for(const m of ls)if(!u.includes(m))u.push(m);return u.slice(-4)}
function makeMon(id,lv,o){o=o||{};const dv={hp:ri(16),at:ri(16),df:ri(16),sc:ri(16),sp:ri(16)};
 const m={id,lv,exp:expFor(lv),dv,st:0,slp:0,fr:o.fr!=null?o.fr:70,item:o.item||0,gleam:o.gleam?1:0};
 m.mv=movesUpTo(id,lv).map(x=>({id:x,pp:MV[x].pp}));m.hp=0;m.hp=maxHP(m);return m}
function stat(m,k){return fl((SP[m.id].bs[k]+m.dv[k])*2*m.lv/100)+5}
function maxHP(m){return fl((SP[m.id].bs.hp+m.dv.hp)*2*m.lv/100)+m.lv+10}
function healMon(m){m.hp=maxHP(m);m.st=0;m.slp=0;for(const v of m.mv)v.pp=MV[v.id].pp}
function healParty(){for(const m of G.party)healMon(m)}
function addSeen(id){G.seen[id]=1}
function addCaught(id){G.seen[id]=1;G.caught[id]=1}
function partyAlive(){let n=0;for(const m of G.party)if(m.hp>0)n++;return n}
function firstAlive(){for(let i=0;i<G.party.length;i++)if(G.party[i].hp>0)return i;return -1}
function frHearts(m){return fl(m.fr/52)}

//------------------------------------------------------------ sprites
const SPRC={};
function sprCanvas(px,pal,key){if(key&&SPRC[key])return SPRC[key];
 const c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d');
 const rows=px.split('|');
 for(let ry=0;ry<16;ry++){let row=rows[ry]||'';if(row.length===8)row+=row.split('').reverse().join('');
  for(let cx=0;cx<16;cx++){const cc=row[cx];if(cc&&cc!=='.'){x.fillStyle=pal[+cc-1]||'#000';x.fillRect(cx,ry,1,1)}}}
 if(key)SPRC[key]=c;return c}
function flipC(c,key){if(key&&SPRC[key])return SPRC[key];const f=document.createElement('canvas');f.width=16;f.height=16;const x=f.getContext('2d');x.translate(16,0);x.scale(-1,1);x.drawImage(c,0,0);if(key)SPRC[key]=f;return f}
function gleamPal(pal){return pal.map(h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);const f2=v=>('0'+v.toString(16)).slice(-2);return '#'+f2(g)+f2(b)+f2(r)})}
function monSpr(id,gl){const s=SP[id];return sprCanvas(s.px,gl?gleamPal(s.pal):s.pal,'m'+id+(gl?'g':''))}
function heroSpr(dir,fr){const f=fr?2:1;
 if(dir==='d')return sprCanvas(HERO['d'+f],HEROPAL,'hd'+f);

function wrap(s,n){const out=[''];for(const w of (''+s).split(' ')){const L=out[out.length-1];if(L&&(L.length+1+w.length)>n)out.push(w);else out[out.length-1]=L?L+' '+w:w}return out}

//------------------------------------------------------------ script tasks
const say=(...tx)=>({k:'say',tx:tx.flat()});
const ask=(tx,opts,cancel)=>({k:'ask',tx:Array.isArray(tx)?tx:[tx],opts,cancel});
const wait=f=>({k:'wait',f});
const doT=fn=>({k:'do',fn});
const sfxT=n=>({k:'sfx',n});
function startScript(gen,onDone){const sm={gen,onDone,val:undefined,running:false};
 sm.mode={tr:true,u(){},d(){},sm};pushM(sm.mode);pump(sm)}
function runScript(genFn,onDone){startScript(genFn(),onDone)}
function pump(sm){if(sm.running)return;sm.running=true;
 for(;;){let r;try{r=sm.gen.next(sm.val)}catch(e){if(typeof console!=='undefined')console.error('script error',e);r={done:true}}
  sm.val=undefined;
  if(r.done){remM(sm.mode);sm.running=false;if(sm.onDone)sm.onDone(r.value);return}
  let sync=true,fin=false;
  try{execTask(r.value,res=>{sm.val=res;fin=true;if(!sync){sm.running=false;pump(sm)}})}
  catch(e){if(typeof console!=='undefined')console.error('task error',e,r.value);fin=true}
  sync=false;
  if(!fin){sm.running=false;return}}}
function execTask(t,cb){if(!t){cb();return}switch(t.k){
 case 'say':pushM(DialogMode(t.tx,()=>cb()));break;
 case 'ask':pushM(DialogMode(t.tx,i=>cb(i),{opts:t.opts,cancel:t.cancel}));break;
 case 'wait':pushM({tr:true,f:t.f,u(){if(--this.f<=0){remM(this);cb()}},d(){}});break;
 case 'fade':pushM(FadeMode(t.dir,()=>cb()));break;
 case 'do':cb(t.fn());break;
 case 'sfx':sfx(t.n);cb();break;
 case 'song':playSong(t.n);cb();break;
 case 'emote':pushM(EmoteMode(t.n,t.f||30,()=>cb()));break;
 case 'npcwalk':pushM(NpcWalkMode(t.n,()=>cb()));break;
 case 'anim':pushM({tr:true,f:0,u(){this.f++;if(this.f>=t.f){remM(this);cb()}},d(){if(t.d)t.d(this.f)}});break;
 case 'push':pushM(t.mk(cb));break;
 case 'battle':pushM(BattleMode(t,r=>cb(r)));break;
 case 'shop':pushM(ShopMode(t,()=>cb()));break;
 case 'vault':pushM(VaultMode(()=>cb()));break;
 case 'party':pushM(PartyMode(t,i=>cb(i)));break;
 case 'bag':pushM(BagMode(t,r=>cb(r)));break;
 case 'name':pushM(NameMode(s=>cb(s)));break;
 case 'forget':pushM(ForgetMode(t.mon,t.mv,i=>cb(i)));break;
 case 'evo':pushM(EvoMode(t.mon,t.to,r=>cb(r)));break;
 default:cb()}}

function DialogMode(tx,cb,opt){const pages=[];
 for(const t of tx){const ls=wrap(t,24);for(let i=0;i<ls.length;i+=2)pages.push(ls.slice(i,i+2))}
 if(!pages.length)pages.push(['']);
 let pi=0,shown=0,choosing=false,choice=0;
 const tot=p=>p.reduce((a,l)=>a+l.length,0);
 return {tr:true,
 u(){const spd=[0.6,1.4,3][G?G.opts.txt:1];
  if(choosing){
   if(kp('u')){choice=(choice+opt.opts.length-1)%opt.opts.length;sfx('blip')}
   if(kp('d')){choice=(choice+1)%opt.opts.length;sfx('blip')}
   if(kp('a')){sfx('conf');remM(this);cb(choice)}
   else if(kp('b')){sfx('blip');remM(this);cb(opt.cancel!=null?opt.cancel:opt.opts.length-1)}
   return}
  const T=tot(pages[pi]);
  if(shown<T){shown+=spd;if(kp('a')||kp('b'))shown=T;return}
  if(pi<pages.length-1){if(kp('a')||kp('b')){pi++;shown=0;sfx('blip')}return}
  if(opt&&opt.opts){choosing=true;return}
  if(kp('a')||kp('b')){sfx('blip');remM(this);cb()}},
 d(){panel(0,104,160,40);const ls=pages[pi];let c=0;
  for(let i=0;i<ls.length;i++){const lim=clamp(fl(shown)-c,0,ls[i].length);drawText(ls[i].slice(0,lim),8,112+i*13);c+=ls[i].length}
  if(fl(shown)>=tot(pages[pi])&&!choosing&&fl(Date.now()/280)%2){ctx.fillStyle='#282828';ctx.fillRect(149,134,5,2);ctx.fillRect(150,136,3,2);ctx.fillRect(151,138,1,2)}
  if(choosing){const n=opt.opts.length,w=78,h=n*13+10,px=W-w-1,py=103-h;panel(px,py,w,h);
   for(let i=0;i<n;i++){drawText(opt.opts[i],px+14,py+6+i*13);if(i===choice)drawText('>',px+5,py+6+i*13)}}}}}

function FadeMode(dir,cb){let f=0;return {tr:true,u(){f++;if(f>=16){remM(this);cb()}},
 d(){const a=dir==='in'?1-f/16:f/16;ctx.fillStyle='rgba(8,8,12,'+a.toFixed(2)+')';ctx.fillRect(0,0,W,H)}}}
function EmoteMode(n,fr,cb){let f=0;return {tr:true,u(){f++;if(f>=fr){remM(this);cb()}},
 d(){const [cx,cy]=OW.cam();const sx=n.x*16+(n.px||0)-cx,sy=n.y*16+(n.py||0)-cy-14;panel(sx+4,sy-2,9,12);drawText('!',sx+6,sy)}}}
function NpcWalkMode(n,cb){return {tr:true,u(){
  const ddx=G.x-n.x,ddy=G.y-n.y;
  if(Math.abs(ddx)+Math.abs(ddy)<=1){n.px=0;n.py=0;remM(this);cb();return}

function npcTick(){const mp=MAPS[G.map];
 for(const n of mp.npcs){if(!npcVis(n))continue;
  if(n.px)n.px-=Math.sign(n.px);if(n.py)n.py-=Math.sign(n.py);
  if(!n.mv)continue;
  if(--n.wt>0)continue;n.wt=70+ri(110);
  const d=pick(['u','d','l','r']);const [vx,vy]=DV[d];
  const tx=n.x+vx,ty=n.y+vy;
  if(Math.abs(tx-n.x0)>1||Math.abs(ty-n.y0)>1)continue;
  if(blockedAt(tx,ty)||(tx===G.x&&ty===G.y))continue;
  const t=tileAt(tx,ty);
  if(t!=='.'&&t!=='-'&&t!=='f'&&t!=='_')continue;
  if(mp.warps.some(w=>w.x===tx&&w.y===ty))continue;
  n.fdir=d;n.x=tx;n.y=ty;n.px=-vx*16;n.py=-vy*16}}

  for(let i=1;i<=n.tr.sight;i++){const tx=n.x+vx*i,ty=n.y+vy*i;
   if(tx===G.x&&ty===G.y){engage(n);return}

function heldDmg(att,def,mv,base,phys){
 if(att.item==='powerband')base=fl(base*1.1);
 if(att.item==='cinderfang'&&mv.t==='EMBER')base=fl(base*1.2);
 if(att.item==='tidepearl'&&mv.t==='TIDE')base=fl(base*1.2);
 if(att.item==='leafcrest'&&mv.t==='FLORA')base=fl(base*1.2);

 return base}
function calcDmg(att,def,aS,dS,mv,crit){const phys=!!PHYS[mv.t];
 let A=stat(att,phys?'at':'sc'),D=stat(def,phys?'df':'sc');
 if(!crit){A=Math.max(1,fl(A*stg(aS[phys?'atk':'spc'])));D=Math.max(1,fl(D*stg(dS[phys?'def':'spc'])))}
 if(def.item==='irontalisman'&&phys)D=fl(D*1.12);
 if(att.st==='BRN'&&phys)A=Math.max(1,fl(A/2));
 let b=fl(fl(fl(2*att.lv/5+2)*mv.p*A/Math.max(1,D))/50)+2;
 if(crit)b*=2;
 if(SP[att.id].t.includes(mv.t))b=fl(b*1.5);
 b=fl(b*effMul(mv.t,SP[def.id].t));
 b=heldDmg(att,def,mv,b,phys);
 b=fl(b*(217+ri(39))/255);
 return Math.max(1,b)}

 let tot=0;const sc=us.map(s=>{const m=MV[s.id];let w;
  if(m.p>0){const ef=effMul(m.t,SP[p.id].t);w=ef===0?0.01:m.p*ef*(SP[e.id].t.includes(m.t)?1.5:1)}
  else{w=(turn<2?42:10);if(m.st&&p.st)w=0.5}
  tot+=w;return [s,w]});
 let r=Math.random()*tot;for(const [s,w] of sc){r-=w;if(r<0)return s}return us[0]}

  att.st=0;yield say(an+' woke up!')}
 if(att.st==='PAR'&&ch(.25)){yield say(an+' is fully numbed!');return}
 if(slot.id!=='struggle')slot.pp--;
 yield say(an+' used '+mv.n+'!');
 if(mv.a>0){const hitC=(mv.a/100)*astg(aS.acc);
  if(Math.random()>=hitC){yield say('The attack missed!');return}}
 if(mv.p>0){
  const ef=effMul(mv.t,SP[def.id].t);
  if(ef===0){yield say("It doesn't affect "+dn+'...');return}
  const crit=ch(mv.hc?1/8:1/16);
  const dmg=calcDmg(att,def,aS,dS,mv,crit);
  if(side==='p'){B.flashE=14}else{B.flashP=14}
  if(ef>1||crit)B.shakeT=10;
  sfx(ef>1?'hit2':'hit');
  def.hp=Math.max(0,def.hp-dmg);
  yield wait(clamp(fl(dmg/Math.max(1,maxHP(def))*60)+12,14,52));
  if(crit)yield say('A critical hit!');
  if(ef>1)yield say("It's super effective!");
  if(ef<1)yield say("It's not very effective...");
  if(mv.drain&&att.hp>0){const h=Math.max(1,fl(dmg/2));att.hp=Math.min(maxHP(att),att.hp+h);
   yield say(an+' drained the wound!')}
  if(mv.rec){att.hp=Math.max(0,att.hp-Math.max(1,fl(dmg/4)));yield say(an+' is hurt by recoil!')}
  if(def.hp>0){
   if(mv.brn&&!def.st&&!SP[def.id].t.includes('EMBER')&&ri(100)<mv.brn){def.st='BRN';yield say(dn+' was burned!')}
   else if(mv.psn&&!def.st&&!SP[def.id].t.includes('ALLOY')&&ri(100)<mv.psn){def.st='PSN';yield say(dn+' was poisoned!')}
   else if(mv.par&&!def.st&&ri(100)<mv.par){def.st='PAR';yield say(dn+' is numbed! It may not move!')}
   if(mv.stat&&mv.stat.who==='foe'&&(mv.stat.c?ri(100)<mv.stat.c:false)){
    yield* statChange(B,def,dS,dn,mv.stat)}}
  return}
 // pure status moves
 if(mv.st){const tgt=def,tn=dn;
  if(tgt.st){yield say('But it failed!');return}
  if(mv.st==='PSN'&&SP[tgt.id].t.includes('ALLOY')){yield say("It doesn't affect "+tn+'...');return}
  if(mv.st==='SLP'){tgt.st='SLP';tgt.slp=2+ri(3);yield say(tn+' fell asleep!')}

 if(mv.stat){const self=mv.stat.who==='self';

function* giveExp(B){const e=B.e;

 if(!ps.length)return;

   const om=maxHP(m);m.lv++;m.hp+=maxHP(m)-om;m.fr=Math.min(255,m.fr+3);

   for(const lm of SP[m.id].mv){if(lm[0]!==m.lv)continue;const mid=lm[1];

       yield say('1, 2 and... poof!',SP[m.id].n+' forgot '+old+'...','And learned '+MV[mid].n+'!')}}

 return 'caught'}

function selfTest(){const errs=[];
 const tileChars='.gf-wTLFSrCDRBPWoxq#_kphenamdHYZuUi^v<>';
 for(const k in MAPS){const mp=MAPS[k],g=mp.g,w=g[0].length;
  for(let y=0;y<g.length;y++){if(g[y].length!==w)errs.push(k+' row '+y+' width '+g[y].length+' != '+w);
   for(const c of g[y])if(tileChars.indexOf(c)<0)errs.push(k+' unknown tile "'+c+'"')}
  const at=(x,y)=>(y<0||y>=g.length||x<0||x>=w)?'T':g[y][x];
  for(const wp of mp.warps){
   if(!MAPS[wp.m]){errs.push(k+' warp to missing map '+wp.m);continue}
   const tg=MAPS[wp.m].g;
   if(wp.ty>=tg.length||wp.tx>=tg[0].length){errs.push(k+' warp OOB to '+wp.m);continue}
   const c=tg[wp.ty][wp.tx];
   if(SOLID[c]||c==='H')errs.push(k+' warp lands on solid "'+c+'" in '+wp.m)}
  if(mp.edges)for(const dk in mp.edges)if(!MAPS[mp.edges[dk].m])errs.push(k+' edge to missing map');
  for(const n of mp.npcs){
   if(n.y>=g.length||n.x>=w){errs.push(k+' npc out of bounds');continue}
   if(SOLID[at(n.x,n.y)])errs.push(k+' npc standing on solid "'+at(n.x,n.y)+'" at '+n.x+','+n.y);
   if(n.tr){const team=n.tr.rival?rivalTeam(n.tr.rival):n.tr.team;
    for(const e of team)if(!SP[e[0]])errs.push(k+' trainer bad species '+e[0]);
    if(n.tr.win&&!SCRIPTS[n.tr.win])errs.push(k+' missing win script '+n.tr.win)}
   if(n.dscript&&!SCRIPTS[n.dscript])errs.push(k+' missing dscript '+n.dscript)}
  for(const it of mp.items){if(!IT[it.it])errs.push(k+' bad item '+it.it);
   if(SOLID[at(it.x,it.y)])errs.push(k+' item on solid')}
  for(const e of (mp.trig||[]).concat(mp.exam||[]))if(!SCRIPTS[e.s])errs.push(k+' missing script '+e.s);
  if(mp.enc)for(const ph of ['m','d','n'])for(const e of (mp.enc[ph]||[]))if(!SP[e[0]])errs.push(k+' enc bad species '+e[0])}
 for(let i=1;i<=DEXN;i++){const s=SP[i];
  const rows=s.px.split('|');
  if(rows.length!==16)errs.push(s.n+' px has '+rows.length+' rows');
  for(const r of rows){if(r.length!==8&&r.length!==16)errs.push(s.n+' px row len '+r.length);
   for(const c of r)if('.12345'.indexOf(c)<0)errs.push(s.n+' bad px char '+c)}
  for(const e of s.mv)if(!MV[e[1]])errs.push(s.n+' bad move '+e[1]);
  if(s.ev&&!SP[s.ev.to])errs.push(s.n+' bad evo target');
  if(s.ev&&s.ev.item&&!IT[s.ev.item])errs.push(s.n+' bad evo item')}
 for(const gk of ['gym1','gym2','gym3']){const mp=MAPS[gk],g=mp.g,w=g[0].length,h=g.length;
  const pass=c=>'_YZuUdi^v<>'.indexOf(c)>=0;
  const st0=mp.warps[0],L=mp.npcs[0];
  const seen=new Set([st0.x+','+st0.y]);const q=[[st0.x,st0.y]];let ok=false;
  while(q.length){const [x,y]=q.shift();
   if(Math.abs(x-L.x)+Math.abs(y-L.y)===1){ok=true;break}
   for(const dd of [[0,1],[0,-1],[1,0],[-1,0]]){const nx=x+dd[0],ny=y+dd[1];
    if(nx<0||ny<0||nx>=w||ny>=h)continue;
    const key=nx+','+ny;if(seen.has(key))continue;seen.add(key);
    if(pass(g[ny][nx]))q.push([nx,ny])}}
  if(!ok)errs.push(gk+' leader unreachable')}
 {const g=MAPS.cave.g;const pass=c=>c==='q'||c==='d';
  const seen=new Set(['1,8']);const q=[[1,8]];let ok=false;
  while(q.length){const [x,y]=q.shift();
   if(x===18&&y===7){ok=true;break}

function simBattle(t,policy){policy=policy||{};const B=mkBattle(t);

 for(let i=0;i<40000;i++){let r;
  try{r=gen.next(val)}catch(e){return 'ERR:'+(e&&e.stack||e)}
  val=undefined;
  if(r.done)return r.value;
  const tk=r.value||{};
  switch(tk.k){
   case 'do':val=tk.fn();break;
   case 'ask':val=(policy.ask!==undefined)?policy.ask:0;break;
   case 'push':
    if(tk.tag==='bmenu')val=policy.menu?policy.menu(B):0;
    else if(tk.tag==='bmove'){let mi=0;const m=G.party[B.pIdx];
     for(let j=0;j<m.mv.length;j++)if(m.mv[j].pp>0){mi=j;break}
     val=mi}
    else val=0;
    break;

<script src="https://telegram.org/js/games.js"></script>
<script>
(function(){
  function calcScore(){
    try{
      var g = window.FW && window.FW.G;
      if(!g) return 0;
      var score = (g.money|0);
      score += (g.badges ? g.badges.length : 0) * 1000;
      score += (g.vault ? g.vault.length : 0) * 40;
      if(g.party) for(var i=0;i<g.party.length;i++) score += (g.party[i].lv||1) * 25;
      return Math.max(0, Math.floor(score));
    }catch(e){ return 0; }
  }
  function submitScore(){
    var score = calcScore();
    try{
      if(typeof TelegramGameProxy !== "undefined" && TelegramGameProxy.postEvent){
        TelegramGameProxy.postEvent("share_score", false, score);
        return;
      }
    }catch(e){}
    try{
      var m = (location.hash||"").match(/tgShareScoreUrl=([^&]+)/);
      if(m){
        var url = decodeURIComponent(m[1]);
        location.href = url + (url.indexOf("?")>=0?"&":"?") + "score=" + score;
        return;
      }
    }catch(e){}
    prompt("Счёт для бота (отправь команду):", "/score " + score);
  }
  function mountBtn(){
    if(document.getElementById("tgScoreBtn")) return;
    var b = document.createElement("button");
    b.id = "tgScoreBtn";
    b.textContent = "Счёт → TG";
    b.style.cssText = "position:fixed;right:10px;top:10px;z-index:20;padding:8px 12px;border-radius:10px;border:2px solid #3c3c5e;background:#1d1d30;color:#e6c95e;font:bold 12px monospace;cursor:pointer";
    b.onclick = submitScore;
    document.body.appendChild(b);
  }
  if(document.readyState === "loading") addEventListener("load", mountBtn); else mountBtn();
})();
</script>
